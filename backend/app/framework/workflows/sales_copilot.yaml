name: "AI Sales Copilot"
domain: "sales"
retry_policy:
  max_retries: 2
  delay: 1.0

workflows:
  - step: 1
    agents: ["crm_agent"]
    parallel: false
  - step: 2
    agents: ["knowledge_agent"]
    parallel: false
  - step: 3
    agents: ["risk_agent"]
    parallel: false
  - step: 4
    agents: ["opportunity_agent"]
    parallel: false
  - step: 5
    agents: ["recommendation_agent"]
    parallel: false
  - step: 6
    agents: ["human_review_agent"]
    parallel: false
  - step: 7
    agents: ["memory_agent"]
    parallel: false
